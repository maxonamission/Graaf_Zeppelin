# CI-workflow voor Graaf Zeppelin (S14-06).
# Draait dezelfde checks als pre-commit, maar op een schone runner en niet
# te omzeilen met --no-verify.

name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Test-env vars die sommige imports nodig hebben.
      SECRET_KEY: "ci-secret-key-at-least-32-chars-long-xxxxxxxxxx"
      DATABASE_URL: "sqlite+aiosqlite:///./ci.db"
      ENVIRONMENT: "development"

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Debug — versies
        run: |
          python --version
          ruff --version
          mypy --version

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check --diff .

      - name: Mypy (strict op EPIC-14-modules)
        run: >
          mypy
          app/core/dag_engine.py
          app/core/id_schema.py
          app/core/validation.py
          app/core/graph_models.py
          app/core/graph_io.py

      - name: Graph-validatie op checked-in model
        run: python scripts/validate_graph.py data/models/sportdeelname_graph.json

      - name: Stories-consistentie (full)
        run: python scripts/check_story_status.py --mode=full

      - name: Pytest (graph-gerelateerde tests)
        # Subset van de suite totdat S15-01 (pytest-asyncio) de volledige
        # API-/integration-tests terug in de run brengt. Zie EPIC-15.
        run: >
          pytest -q
          tests/test_dag_engine.py
          tests/test_id_schema.py
          tests/test_validation.py
          tests/test_graph_models.py
          tests/test_conversions.py
          tests/test_slider_engine.py
          tests/test_prompt_builder.py
