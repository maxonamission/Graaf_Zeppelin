<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Graaf Zeppelin{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="page">
        {% if user %}
        <nav>
            <div class="container">
                <a href="/dashboard" class="brand"><span>Graaf</span> Zeppelin</a>
                <div class="nav-links">
                    <a href="/dashboard">Dashboard</a>
                    <a href="/verkenner">Verkenner</a>
                    <a href="/graph">Model</a>
                    <a href="/reasoning">Redeneren</a>
                    <a href="/releases">Updates</a>
                    <a href="/license">Licentie</a>
                    <a href="#" onclick="document.cookie='access_token=; path=/; max-age=0'; window.location='/login';">Uitloggen</a>
                </div>
            </div>
        </nav>
        {% endif %}

        <div class="content">
            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
