{% extends "base.html" %}
{% block title %}Registreren — Graaf Zeppelin{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Registreren</h2>

    <div id="register-error"></div>

    <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label for="full_name">Volledige naam</label>
            <input type="text" id="full_name" name="full_name" required>
        </div>
        <div class="form-group">
            <label for="email">E-mailadres</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="organization">Organisatie</label>
            <input type="text" id="organization" name="organization"
                   placeholder="Bijv. Gemeente Utrecht, KNVB, SV Dynamo" required>
        </div>
        <div class="form-group">
            <label for="license_key">Licentiesleutel</label>
            <input type="text" id="license_key" name="license_key"
                   placeholder="GZ-XXXX-XXXX" required>
        </div>
        <div class="form-group">
            <label for="password">Wachtwoord</label>
            <input type="password" id="password" name="password" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            Account aanmaken
        </button>
    </form>

    <p style="text-align: center; margin-top: 1rem; color: var(--text-muted);">
        Al een account? <a href="/login">Inloggen</a>
    </p>
</div>

<script>
async function handleRegister(e) {
    e.preventDefault();
    const body = {
        full_name: document.getElementById('full_name').value,
        email: document.getElementById('email').value,
        organization: document.getElementById('organization').value,
        license_key: document.getElementById('license_key').value,
        password: document.getElementById('password').value,
    };

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (res.ok) {
            document.cookie = `access_token=${data.access_token}; path=/; max-age=86400; SameSite=Strict`;
            window.location.href = '/dashboard';
        } else {
            document.getElementById('register-error').innerHTML =
                `<div class="alert alert-error">${data.detail}</div>`;
        }
    } catch (err) {
        document.getElementById('register-error').innerHTML =
            '<div class="alert alert-error">Verbindingsfout. Probeer het opnieuw.</div>';
    }
}
</script>
{% endblock %}
